# ============================================================
# Maven Quality Gate — GitHub Actions Workflow
# ============================================================
# Copy this file to .github/workflows/quality-gate.yml in your project.
#
# Runs on every push and PR to main. Checks:
#   1. Dependency vulnerabilities (npm audit)
#   2. Secret leak detection (pattern matching on source files)
#   3. Production build verification (next build)
#   4. Posts results as PR comment when triggered by a pull request
#
# Threshold: score 80+ to pass (configurable via QUALITY_GATE_THRESHOLD)
# ============================================================

name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  QUALITY_GATE_THRESHOLD: 80

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Setup ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: bun install

      # ── 1. Dependency Audit ──────────────────────────────────
      - name: Run npm audit
        id: audit
        continue-on-error: true
        run: |
          echo "## Dependency Audit" >> $GITHUB_STEP_SUMMARY

          # Capture full audit output
          set +e
          AUDIT_OUTPUT=$(bun audit --audit-level=high 2>&1)
          AUDIT_EXIT=$?
          set -e

          echo "$AUDIT_OUTPUT"

          if [ $AUDIT_EXIT -eq 0 ]; then
            echo "audit_status=pass" >> $GITHUB_OUTPUT
            echo "audit_detail=No high or critical vulnerabilities found" >> $GITHUB_OUTPUT
            echo "> No high or critical vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          else
            echo "audit_status=fail" >> $GITHUB_OUTPUT
            # Count vulnerabilities by severity
            CRITICAL=$(bun audit --json 2>/dev/null | jq '.metadata.vulnerabilities.critical // 0')
            HIGH=$(bun audit --json 2>/dev/null | jq '.metadata.vulnerabilities.high // 0')
            MODERATE=$(bun audit --json 2>/dev/null | jq '.metadata.vulnerabilities.moderate // 0')
            echo "audit_detail=${CRITICAL} critical, ${HIGH} high, ${MODERATE} moderate vulnerabilities" >> $GITHUB_OUTPUT
            echo "> **${CRITICAL} critical, ${HIGH} high, ${MODERATE} moderate** vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          fi

      # ── 2. Secret Leak Scan ──────────────────────────────────
      - name: Scan for leaked secrets
        id: secrets
        run: |
          echo "## Secret Leak Scan" >> $GITHUB_STEP_SUMMARY

          FOUND=0
          DETAILS=""

          # Define patterns to scan for in source files (excluding node_modules, .next, .git)
          # Each pattern: "LABEL:::REGEX"
          PATTERNS=(
            "Stripe secret key:::sk_live_[a-zA-Z0-9]{20,}"
            "Stripe test key:::sk_test_[a-zA-Z0-9]{20,}"
            "AWS access key:::AKIA[A-Z0-9]{16}"
            "GitHub PAT:::ghp_[a-zA-Z0-9]{36}"
            "GitHub PAT (fine-grained):::github_pat_[a-zA-Z0-9_]{20,}"
            "OpenAI/Anthropic key:::sk-[a-zA-Z0-9]{40,}"
            "Slack bot token:::xoxb-[a-zA-Z0-9-]{20,}"
            "Slack user token:::xoxp-[a-zA-Z0-9-]{20,}"
            "SendGrid key:::SG\.[a-zA-Z0-9_-]{22,}\.[a-zA-Z0-9_-]{43,}"
            "Google API key:::AIza[a-zA-Z0-9_-]{35}"
            "Private key:::-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----"
            "Resend API key:::re_[a-zA-Z0-9_]{20,}"
            "Generic password assignment:::password\s*[:=]\s*[\"'][^\"']{8,}[\"']"
          )

          # Files to scan: ts, tsx, js, jsx, json, mjs, cjs (exclude config/lock files, tests, env examples)
          SCAN_FILES=$(find . \
            -type f \
            \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" -o -name "*.mjs" -o -name "*.cjs" -o -name "*.json" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/.next/*" \
            -not -path "*/.git/*" \
            -not -path "*/dist/*" \
            -not -path "*/coverage/*" \
            -not -name "package-lock.json" \
            -not -name "*.test.*" \
            -not -name "*.spec.*" \
            -not -name ".env.example" \
            -not -name ".env.template" \
            2>/dev/null || true)

          if [ -z "$SCAN_FILES" ]; then
            echo "No source files found to scan."
            echo "secrets_status=pass" >> $GITHUB_OUTPUT
            echo "secrets_found=0" >> $GITHUB_OUTPUT
            echo "secrets_detail=No source files to scan" >> $GITHUB_OUTPUT
            exit 0
          fi

          for ENTRY in "${PATTERNS[@]}"; do
            LABEL="${ENTRY%%:::*}"
            REGEX="${ENTRY##*:::}"

            # Use grep with extended regex; skip lines referencing env vars or comments
            MATCHES=$(echo "$SCAN_FILES" | xargs grep -rlnE "$REGEX" 2>/dev/null | head -20 || true)
            if [ -n "$MATCHES" ]; then
              # Filter out false positives: lines with process.env, import.meta.env, or pure comments
              REAL_MATCHES=""
              while IFS= read -r FILE; do
                [ -z "$FILE" ] && continue
                HIT=$(grep -nE "$REGEX" "$FILE" 2>/dev/null | grep -vE "process\.env|import\.meta\.env|^\s*//|must be|at least|validation|errors\." || true)
                if [ -n "$HIT" ]; then
                  REAL_MATCHES="${REAL_MATCHES}${FILE}\n"
                fi
              done <<< "$MATCHES"

              if [ -n "$REAL_MATCHES" ]; then
                COUNT=$(echo -e "$REAL_MATCHES" | grep -c "." || true)
                FOUND=$((FOUND + COUNT))
                DETAILS="${DETAILS}- **${LABEL}**: found in ${COUNT} file(s)\n"
                echo "::warning::Secret pattern '${LABEL}' found in source files"
              fi
            fi
          done

          # Check for committed .env files (not .env.example or .env.template)
          ENV_FILES=$(git ls-files '*.env' '.env.*' 2>/dev/null | grep -vE '\.(example|template|sample)$' || true)
          if [ -n "$ENV_FILES" ]; then
            ENV_COUNT=$(echo "$ENV_FILES" | wc -l | tr -d ' ')
            FOUND=$((FOUND + ENV_COUNT))
            DETAILS="${DETAILS}- **Committed .env file(s)**: ${ENV_FILES}\n"
            echo "::error::Environment files committed to repository: ${ENV_FILES}"
          fi

          echo "secrets_found=$FOUND" >> $GITHUB_OUTPUT

          if [ $FOUND -gt 0 ]; then
            echo "secrets_status=fail" >> $GITHUB_OUTPUT
            echo "secrets_detail=${FOUND} potential secret(s) detected" >> $GITHUB_OUTPUT
            echo "> **${FOUND} potential secret(s) detected.**" >> $GITHUB_STEP_SUMMARY
            echo -e "$DETAILS" >> $GITHUB_STEP_SUMMARY
          else
            echo "secrets_status=pass" >> $GITHUB_OUTPUT
            echo "secrets_detail=No leaked secrets detected" >> $GITHUB_OUTPUT
            echo "> No leaked secrets detected." >> $GITHUB_STEP_SUMMARY
          fi

      # ── 3. Build Verification ────────────────────────────────
      - name: Build project
        id: build
        continue-on-error: true
        run: |
          echo "## Build Verification" >> $GITHUB_STEP_SUMMARY

          set +e
          BUILD_OUTPUT=$(bun run build 2>&1)
          BUILD_EXIT=$?
          set -e

          if [ $BUILD_EXIT -eq 0 ]; then
            echo "build_status=pass" >> $GITHUB_OUTPUT
            echo "> Build succeeded." >> $GITHUB_STEP_SUMMARY
          else
            echo "build_status=fail" >> $GITHUB_OUTPUT
            echo "> **Build failed.**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$BUILD_OUTPUT" | tail -30 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "::error::Build failed"
          fi

          echo "build_exit=$BUILD_EXIT" >> $GITHUB_OUTPUT
        env:
          # Placeholder values so Next.js build doesn't fail on missing env vars.
          # These are NOT real credentials — they satisfy build-time type checks only.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          RESEND_API_KEY: re_placeholder

      # ── 4. Compute Score & Verdict ───────────────────────────
      - name: Compute quality score
        id: score
        run: |
          SCORE=100
          ISSUES=""

          # Deduct for audit failures (critical/high = -30, moderate-only = -10)
          if [ "${{ steps.audit.outputs.audit_status }}" = "fail" ]; then
            SCORE=$((SCORE - 30))
            ISSUES="${ISSUES}Dependency vulnerabilities found. "
          fi

          # Deduct for secret leaks (-40 per occurrence, capped)
          SECRETS_FOUND="${{ steps.secrets.outputs.secrets_found }}"
          if [ "$SECRETS_FOUND" -gt 0 ] 2>/dev/null; then
            DEDUCTION=$((SECRETS_FOUND * 40))
            if [ $DEDUCTION -gt 60 ]; then DEDUCTION=60; fi
            SCORE=$((SCORE - DEDUCTION))
            ISSUES="${ISSUES}${SECRETS_FOUND} secret leak(s) detected. "
          fi

          # Deduct for build failure (-30)
          if [ "${{ steps.build.outputs.build_status }}" = "fail" ]; then
            SCORE=$((SCORE - 30))
            ISSUES="${ISSUES}Build failed. "
          fi

          # Floor at 0
          if [ $SCORE -lt 0 ]; then SCORE=0; fi

          THRESHOLD=${{ env.QUALITY_GATE_THRESHOLD }}
          if [ $SCORE -ge $THRESHOLD ]; then
            VERDICT="PASSED"
          else
            VERDICT="FAILED"
          fi

          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
          echo "issues=$ISSUES" >> $GITHUB_OUTPUT

          echo "## Quality Gate: ${VERDICT}" >> $GITHUB_STEP_SUMMARY
          echo "**Score: ${SCORE}/100** (threshold: ${THRESHOLD})" >> $GITHUB_STEP_SUMMARY

          echo ""
          echo "======================================"
          echo "  Quality Gate: ${VERDICT}"
          echo "  Score: ${SCORE}/100 (threshold: ${THRESHOLD})"
          echo "======================================"
          if [ -n "$ISSUES" ]; then
            echo "  Issues: ${ISSUES}"
          fi
          echo ""

      # ── 5. Post PR Comment ──────────────────────────────────
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const score = '${{ steps.score.outputs.score }}';
            const verdict = '${{ steps.score.outputs.verdict }}';
            const threshold = '${{ env.QUALITY_GATE_THRESHOLD }}';
            const auditStatus = '${{ steps.audit.outputs.audit_status }}';
            const auditDetail = '${{ steps.audit.outputs.audit_detail }}';
            const secretsStatus = '${{ steps.secrets.outputs.secrets_status }}';
            const secretsDetail = '${{ steps.secrets.outputs.secrets_detail }}';
            const buildStatus = '${{ steps.build.outputs.build_status }}';
            const issues = '${{ steps.score.outputs.issues }}';

            const icon = (s) => s === 'pass' ? ':white_check_mark:' : ':x:';
            const verdictIcon = verdict === 'PASSED' ? ':white_check_mark:' : ':x:';

            const body = [
              `## ${verdictIcon} Quality Gate: **${verdict}**`,
              `**Score: ${score}/100** (threshold: ${threshold})`,
              '',
              '| Check | Status | Details |',
              '|-------|--------|---------|',
              `| Dependency Audit | ${icon(auditStatus)} | ${auditDetail} |`,
              `| Secret Scan | ${icon(secretsStatus)} | ${secretsDetail} |`,
              `| Build | ${icon(buildStatus)} | ${buildStatus === 'pass' ? 'Succeeded' : 'Failed'} |`,
              '',
              issues ? `**Issues:** ${issues}` : '',
              '',
              '---',
              '*Maven Quality Gate v1.0*',
            ].join('\n');

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Quality Gate:')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── 6. Enforce Gate ──────────────────────────────────────
      - name: Enforce quality gate
        if: always()
        run: |
          VERDICT="${{ steps.score.outputs.verdict }}"
          if [ "$VERDICT" != "PASSED" ]; then
            echo "::error::Quality gate FAILED with score ${{ steps.score.outputs.score }}/${{ env.QUALITY_GATE_THRESHOLD }}"
            exit 1
          fi
          echo "Quality gate passed."
